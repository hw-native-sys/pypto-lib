name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTE: every pre-existing job below is temporarily disabled (`if: false`,
  # kept as `false && <original expr>` where a condition already existed) while
  # the newly added A5 CI server is being brought up. The only job that runs is
  # `a5-runner-smoke`, which just proves the npu-a5 runner can be picked up.
  # To re-enable, drop the `if: false` / `false &&` prefixes.
  pre-commit:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.0
        with:
          extra_args: --all-files

  unit-tests:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-unit-tests
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run golden unit tests
        run: pytest tests/golden -v

  detect-changes:
    if: false
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      files: ${{ steps.check.outputs.files }}
      run_qwen_serving_tests: ${{ steps.check.outputs.run_qwen_serving_tests }}
      run_deepseek_serving_tests: ${{ steps.check.outputs.run_deepseek_serving_tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "files=" >> "$GITHUB_OUTPUT"
            # Serving is PR-only (see its `if`), so never arm it here.
            echo "run_qwen_serving_tests=false" >> "$GITHUB_OUTPUT"
            echo "run_deepseek_serving_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})
          # Map the raw diff to the runnable scripts CI must exercise:
          #  - a changed models/ source file selects every runnable file that
          #    (transitively) imports it, not just the file itself;
          #  - any change outside models/ (golden/, .github/, docs, examples, …)
          #    selects all runnable examples as a smoke test.
          # See .github/scripts/detect_changes.py for the rules.
          FILES=$(printf '%s\n' "$CHANGED_FILES" | python .github/scripts/detect_changes.py)
          if [ -n "$FILES" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          # Serving e2e jobs are model-specific and expensive. CI-infra edits
          # (.github/**) must not trigger them.
          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^models/qwen3/14b/'; then
            echo "run_qwen_serving_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_qwen_serving_tests=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^models/deepseek/v4-(flash|pro)/'; then
            echo "run_deepseek_serving_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_deepseek_serving_tests=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Selected files: $FILES"

  sim:
    needs: detect-changes
    if: >-
      false &&
      (github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.has_changes == 'true')
    # Simulator job: no device needed, so it runs on the CPU runner — but on the
    # host, through the same setup-ci-job composite as the a2a3 device job (same
    # user, same conda venv + activate.sh, same ci-cache). needs-device:false is
    # the only difference: no npu-smi check and no Ascend env, which the simulator
    # does not use.
    runs-on: [self-hosted, linux, arm64, cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [a2a3sim, a5sim]
    defaults:
      run:
        working-directory: checkout
    env:
      PTOAS_ROOT: ${{ github.workspace }}/checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the a2a3 job; 000 keeps cache files mutually writable. Both
      # jobs now run as ci-runner (no container root), but the dir still holds
      # root-owned entries from the container era, so keep the umask.
      # The cache *paths* are exported by setup-ci-job from the runner config's
      # CI_CACHE_ROOT — a static job-level env: cannot see a step's output.
      CCACHE_UMASK: '000'

    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup CI job
        uses: ./.github/actions/setup-ci-job
        with:
          checkout-path: checkout
          needs-device: 'false'
          build-namespace: ${{ matrix.platform }}
          pip-cache-name: pip-sim

      - name: Run ${{ matrix.platform }} tests
        shell: bash
        env:
          PYTHONPATH: ${{ github.workspace }}/checkout
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          source activate.sh
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            # Files marked `# ci: no-sim` (full multi-layer / multi-card
            # forwards) are device-only and would just argparse-reject *sim.
            if grep -qE '^#\s*ci:\s*no-sim' "$f"; then
              echo "skip (no-sim): $f"
              echo "::endgroup::"
              continue
            fi
            if ! python "$f" -p ${{ matrix.platform }}; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Clean up build artifacts
        if: always()
        run: rm -rf build_output

  a2a3:
    needs: detect-changes
    if: >-
      false &&
      (github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.has_changes == 'true')
    # Runs directly on the host like pypto's dist-system-tests — multi-card
    # kernels use HCCL, which needs a host-only env (set_env.sh, HCCL plugin
    # paths); under docker the chip child silent-crashes in comm_init. It holds
    # NO card: every device run is wrapped in `task-submit --device "$DEVICE_ID"`
    # (mechanism B), which borrows a card (or an N-card set for the multi-card
    # `# ci: devices=N` files) from the host-level device queue and passes the
    # lent set as $TASK_DEVICE. The backend controls whether DEVICE_ID is `auto`
    # (borrow any free card) or a fixed card id. Checkout / install happen under
    # ./checkout rather than at the workspace root, so the root holds only the
    # sparsely-fetched action defs and any second repo a job needs (serving's
    # pypto-serving) sits beside this one instead of inside it.
    runs-on: [self-hosted, linux, arm64, npu]
    # Must exceed a single task-submit's worst case (--timeout 3600 queue wait +
    # --max-time 600 run), or the job dies before task-submit's own timeout can
    # ever fire — and the first queued case would eat the whole job budget.
    timeout-minutes: 120
    defaults:
      run:
        working-directory: checkout
    env:
      PTOAS_ROOT: ${{ github.workspace }}/checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_MAXSIZE: 30G
      # Shared with the sim job via the same ci-cache dir; 000 keeps cache files
      # mutually writable. Both jobs now run as ci-runner, but the dir still holds
      # root-owned entries from the container era, so keep the umask.
      # The cache *paths* are exported by setup-ci-job from the runner config's
      # CI_CACHE_ROOT — a static job-level env: cannot see a step's output.
      CCACHE_UMASK: '000'

    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves sibling
        # subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup CI job
        uses: ./.github/actions/setup-ci-job
        with:
          checkout-path: checkout
          needs-device: 'true'
          build-namespace: a2a3
          pip-cache-name: pip-a2a3

      - name: Run a2a3 tests (via task-submit)
        shell: bash
        env:
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          source activate.sh
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES="${{ needs.detect-changes.outputs.files }}"
          else
            FILES=$(find examples -name '*.py' ! -name '*draft*' | sort)
          fi
          if [ -z "$FILES" ]; then
            echo "No runnable changed files; nothing to test."
            exit 0
          fi
          failed=()
          for f in $FILES; do
            echo "::group::$f"
            # Files needing multiple NPUs declare `# ci: devices=N` (N>1) near
            # the top; borrow that many cards with `--device-num N` (defaults to
            # ep2 / 2-card runs). $TASK_DEVICE is the lent set (a single id, or
            # comma-separated for N>1) and is passed straight to -d; the ring env
            # above is preserved into the child. Higher world sizes (ep4/ep8) are
            # exercised as explicit --device-num 4/8 steps in daily_ci.yml.
            ndev=$(grep -oP '#\s*ci:\s*devices=\K[0-9]+' "$f" | head -1)
            ndev=${ndev:-1}
            devnum_flag=""
            [ "$ndev" -gt 1 ] && devnum_flag="--device-num $ndev"
            task-submit --device "$DEVICE_ID" $devnum_flag --timeout 3600 --max-time 600 \
              --run "cd $GITHUB_WORKSPACE/checkout && source activate.sh && PYTHONPATH=$GITHUB_WORKSPACE/checkout python $f -p a2a3 -d \$TASK_DEVICE"
            if [ $? -ne 0 ]; then
              failed+=("$f")
              echo "::error file=${f}::FAIL"
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            printf 'FAILED: %s\n' "${failed[@]}"
            exit 1
          fi
          echo "All selected files passed."

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: checkout

      - name: Clean up build artifacts
        if: always()
        working-directory: checkout
        run: rm -rf build_output

  serving-qwen:
    needs: detect-changes
    # PR-only, qwen3-14b (single card). The 8-card DeepSeek V4 run is split into
    # its own job (serving-deepseek) so the two models schedule independently and
    # the expensive 8-card borrow does not serialize behind the single-card run.
    if: >-
      false &&
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.run_qwen_serving_tests == 'true'
    runs-on: [self-hosted, linux, arm64, npu]
    # One task-submit worst case: --timeout 3600 queue + --max-time 1800 run,
    # plus setup/build headroom.
    timeout-minutes: 120
    env:
      PTOAS_ROOT: ${{ github.workspace }}/checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_MAXSIZE: 30G
      # The cache paths are exported by setup-ci-job from the runner config's
      # CI_CACHE_ROOT — a static job-level env: cannot see a step's output.
      CCACHE_UMASK: '000'

    steps:
      - name: Fetch composite action definitions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup CI job
        uses: ./.github/actions/setup-ci-job
        with:
          checkout-path: checkout
          needs-device: 'true'
          build-namespace: serving
          # Own ccache: serving's churn must not LRU-evict the a2a3/sim entries.
          ccache-name: ccache-serving
          pip-cache-name: pip-serving

      - name: Run pypto-serving Qwen3-14B tests
        uses: ./.github/actions/pypto-serving-tests
        with:
          pypto-lib-checkout-path: checkout
          pypto-serving-checkout-path: serving-checkout
          model-name: qwen3-14b

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: checkout

      - name: Clean up build artifacts
        if: always()
        run: rm -rf serving-checkout/build_output

  serving-deepseek:
    needs: detect-changes
    # PR-only, DeepSeek V4 — the 8-card (--device-num 8) serving run, split out
    # of `serving` so the 8-card borrow schedules independently of the single-card
    # qwen3 run. Same setup contract as `serving`; gated by its own model guard.
    if: >-
      false &&
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.run_deepseek_serving_tests == 'true'
    runs-on: [self-hosted, linux, arm64, npu]
    # One task-submit worst case: --timeout 3600 queue + --max-time 1800 run,
    # plus setup/build headroom.
    timeout-minutes: 120
    env:
      PTOAS_ROOT: ${{ github.workspace }}/checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_MAXSIZE: 30G
      # The cache paths are exported by setup-ci-job from the runner config's
      # CI_CACHE_ROOT — a static job-level env: cannot see a step's output.
      CCACHE_UMASK: '000'

    steps:
      - name: Fetch composite action definitions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup CI job
        uses: ./.github/actions/setup-ci-job
        with:
          checkout-path: checkout
          needs-device: 'true'
          build-namespace: serving
          # Share serving's dedicated ccache so a2a3/sim entries are not evicted.
          ccache-name: ccache-serving
          pip-cache-name: pip-serving

      - name: Run pypto-serving DeepSeek V4 tests
        uses: ./.github/actions/pypto-serving-tests
        with:
          pypto-lib-checkout-path: checkout
          pypto-serving-checkout-path: serving-checkout
          model-name: deepseek-v4
          pto2-ring-dep-pool: "131072"
          pto2-ring-task-window: "131072"
          pto2-ring-heap: "2147483648"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: checkout

      - name: Clean up build artifacts
        if: always()
        run: rm -rf serving-checkout/build_output

  a5-runner-smoke:
    # Bring-up smoke test for the newly added A5 CI server. Structurally a copy
    # of daily_ci.yml's `model-tests-a5` (same runner labels, same setup-ci-job
    # contract, same cleanup/report steps), with the actual V4-Pro sweep step
    # replaced by a plain `echo` — the point here is only to prove the npu-a5
    # runner gets picked up and the whole setup path (checkout, conda venv,
    # activate.sh, caches, device check) completes. Every other job in this
    # workflow is disabled while this bring-up is in progress.
    runs-on: [self-hosted, linux, arm64, npu-a5]
    # Keep parity with the daily A5 job's ceiling.
    timeout-minutes: 120
    defaults:
      run:
        working-directory: checkout
    env:
      PTOAS_ROOT: ${{ github.workspace }}/checkout/ptoas-bin
      PTO_ISA_ROOT: ${{ github.workspace }}/checkout/pto-isa
      CMAKE_BUILD_PARALLEL_LEVEL: 16
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
      CCACHE_MAXSIZE: 30G
      # The cache *paths* are exported by setup-ci-job from the runner config's
      # CI_CACHE_ROOT — a static job-level env: cannot see a step's output.
      CCACHE_UMASK: '000'

    steps:
      - name: Fetch composite action definitions
        # Local `uses: ./.github/actions/...` resolves against $GITHUB_WORKSPACE,
        # but this job checks the repo out into ./checkout — sparse-fetch just
        # the action defs at the workspace root first (clean: false leaves
        # sibling subdir checkouts on this persistent runner untouched).
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
          clean: false
          persist-credentials: false

      - name: Setup CI job
        uses: ./.github/actions/setup-ci-job
        with:
          checkout-path: checkout
          needs-device: 'true'
          build-namespace: a5-smoke
          pip-cache-name: pip-a5

      - name: Run V4-Pro tests (a5, via task-submit)
        shell: bash
        env:
          PYPTO_LOG_LEVEL: error
          PYPTO_WARNING_LEVEL: none
          # Quiet simpler's runtime logger — see daily_ci.yml for the full note.
          PYPTO_RUNTIME_LOG: error
          PYPTO_BENCH: '1'
          PTO2_RING_DEP_POOL: 16384
          PTO2_RING_TASK_WINDOW: 16384
          PTO2_RING_HEAP: 1073741824
        run: |
          echo "Do something"

      - name: Kill orphaned task-submit tasks
        if: always()
        uses: ./.github/actions/kill-orphaned-tasks
        with:
          checkout-path: checkout

      - name: Clean up build artifacts
        if: always()
        working-directory: checkout
        run: rm -rf build_output

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-a5-smoke
          # The smoke step emits no results.tsv, so tolerate its absence rather
          # than warning on every run; restore the default once this job runs a
          # real sweep.
          if-no-files-found: ignore
          path: checkout/results.tsv
